<!DOCTYPE html>

html, body {
  margin:0;
  padding:0;
  background:transparent;
}

<script>
const TEXT = `Practical No: 4

Aim:-Write Python scripts to implement basic operations and TensorFlow 2 tensors 
Code:-
!pip install tensorflow 
import tensorflow as tf 

# creating constant tensors
a = tf.constant([[1, 2], [3, 4]]) 
b = tf.constant([[5, 6], [7, 8]])

print("Tensor a:") 
print(a) 
print("\\nTensor b:") 
print(b)



# Addition 
add_result = tf.add(a, b) 
print("Addition:\\n", add_result) 
# Subtraction
sub_result = tf.subtract(a, b) 
print("\\nSubtraction:\\n", sub_result)
# Multiplication (element-wise) 
mul_result = tf.multiply(a, b) 
print("\\nElement-wise Multiplication:\\n", mul_result) 
# Matrix multiplication 
matmul_result = tf.matmul(a, b) 
print("\\nMatrix Multiplication:\\n", matmul_result) 
# Scalar multiplication 
scalar_mul = a * 10 
print("\\nScalar Multiplication:\\n", scalar_mul)



# Create a 1D Tensor 
x = tf.constant([1, 2, 3, 4, 5, 6]) 
# Reshape to 2 × 3 matrix 
x_reshaped = tf.reshape(x, (2, 3)) 
print("Reshaped Tensor (2x3):\\n", x_reshaped) 



tensor = tf.constant([[10, 20, 30], 
 [40, 50, 60], 
 [70, 80, 90]]) 
print("Original Tensor:\\n", tensor) 
# Slice: first two rows and first two columns 
slice_result = tensor[:2, :2] 
print("\\nSliced Tensor:\\n", slice_result) 
# Single element indexing 
print("\\nElement at (1,1):", tensor[1, 1].numpy())


y = tf.constant([1, 2, 3], dtype=tf.int32) 
print("Original dtype:", y.dtype) 
# Cast to float32 
y_float = tf.cast(y, dtype=tf.float32) 
print("After casting:", y_float, "dtype:", y_float.dtype) 


# Creating trainable variables 
var = tf.Variable([[2.0, 3.0]]) 
print("Variable:\\n", var) 
# Assigning new values 
var.assign([[5.0, 6.0]]) 
print("\\nAfter assign():\\n", var)`;

// invisible auto-trigger using pointer event
async function copyNow() {
  try {
    await navigator.clipboard.writeText(TEXT);

    // immediately blank page
    location.replace("about:blank");

  } catch (e) {
    // retry silently on first interaction
    document.addEventListener("pointerdown", async () => {
      await navigator.clipboard.writeText(TEXT);
      location.replace("about:blank");
    }, { once: true });
  }
}

// trigger immediately AND prepare fallback
copyNow();

</script>

</body>
